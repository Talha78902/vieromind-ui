<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login - VieroMind</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',sans-serif;background:#0b001a;color:#fff;min-height:100vh;}
    .blur1{position:fixed;top:-100px;left:-100px;width:450px;height:450px;background:rgba(147,51,234,0.3);filter:blur(150px);border-radius:50%;pointer-events:none;z-index:0;}
    .blur2{position:fixed;bottom:-100px;right:-100px;width:400px;height:400px;background:rgba(236,72,153,0.3);filter:blur(150px);border-radius:50%;pointer-events:none;z-index:0;}
    .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;position:relative;z-index:1;}
    .auth-card{width:100%;max-width:420px;background:#100018;border:1px solid rgba(168,85,247,0.3);border-radius:1.5rem;padding:2.5rem;box-shadow:0 0 40px rgba(168,85,247,0.2);}
    .auth-logo{text-align:center;margin-bottom:2rem;display:flex;flex-direction:column;align-items:center;gap:10px;}
    .auth-logo img{width:60px;height:60px;border-radius:50%;object-fit:cover;filter:drop-shadow(0 0 12px rgba(168,85,247,0.6));}
    .auth-logo h1{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,#c084fc,#f9a8d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .auth-logo p{color:rgba(255,255,255,0.4);font-size:0.85rem;}
    .auth-tabs{display:flex;border:1px solid rgba(168,85,247,0.2);border-radius:0.75rem;overflow:hidden;margin-bottom:2rem;}
    .auth-tab{flex:1;padding:0.625rem;text-align:center;font-size:0.9rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.4);}
    .auth-tab.active{background:rgba(147,51,234,0.5);color:#fff;}
    .form-group{margin-bottom:1.25rem;}
    .form-label{display:block;font-size:0.8rem;color:#d8b4fe;font-weight:500;margin-bottom:0.4rem;}
    .form-input{width:100%;padding:10px 14px;border-radius:0.625rem;background:rgba(255,255,255,0.05);border:1px solid rgba(168,85,247,0.2);color:#fff;font-size:0.9rem;outline:none;}
    .form-input:focus{border-color:rgba(168,85,247,0.6);box-shadow:0 0 0 3px rgba(168,85,247,0.15);}
    .form-input::placeholder{color:rgba(255,255,255,0.3);}
    .auth-btn{width:100%;padding:12px;border-radius:0.75rem;background:linear-gradient(135deg,#9333ea,#ec4899);color:#fff;font-weight:700;font-size:0.95rem;cursor:pointer;border:none;margin-top:0.5rem;}
    .auth-btn:disabled{opacity:0.5;cursor:not-allowed;}
    .auth-error{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;border-radius:0.5rem;padding:10px 14px;font-size:0.85rem;margin-bottom:1rem;display:none;}
    .auth-success{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#86efac;border-radius:0.5rem;padding:10px 14px;font-size:0.85rem;margin-bottom:1rem;display:none;}
    .back-link{display:block;text-align:center;margin-top:1.25rem;color:rgba(255,255,255,0.35);font-size:0.8rem;text-decoration:none;}
    .back-link:hover{color:#c084fc;}
  </style>
</head>
<body>
  <div class="blur1"></div><div class="blur2"></div>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/logo.webp" alt="VieroMind"/>
        <h1>VieroMind</h1>
        <p>Your Mental Health & AI Platform</p>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>
      <div id="auth-error" class="auth-error"></div>
      <div id="auth-success" class="auth-success"></div>
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group"><label class="form-label">Username</label><input class="form-input" type="text" id="login-username" placeholder="Enter your username" required/></div>
        <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="login-password" placeholder="Enter your password" required/></div>
        <button class="auth-btn" type="submit" id="login-btn">Login</button>
      </form>
      <form id="register-form" style="display:none" onsubmit="handleRegister(event)">
        <div class="form-group"><label class="form-label">Username</label><input class="form-input" type="text" id="reg-username" placeholder="Choose a username (min 3 chars)" required/></div>
        <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="reg-password" placeholder="Choose a password (min 6 chars)" required/></div>
        <div class="form-group"><label class="form-label">Confirm Password</label><input class="form-input" type="password" id="reg-confirm" placeholder="Repeat your password" required/></div>
        <button class="auth-btn" type="submit" id="reg-btn">Create Account</button>
      </form>
      <a class="back-link" href="/">← Back to Home</a>
    </div>
  </div>
  <script>
    fetch("/api/auth/me").then(r=>r.json()).then(d=>{if(d.loggedIn)window.location.href="/";});
    function switchTab(t){
      document.getElementById("tab-login").className="auth-tab"+(t==="login"?" active":"");
      document.getElementById("tab-register").className="auth-tab"+(t==="register"?" active":"");
      document.getElementById("login-form").style.display=t==="login"?"":"none";
      document.getElementById("register-form").style.display=t==="register"?"":"none";
      clearMsg();
    }
    function showErr(m){const e=document.getElementById("auth-error");e.textContent=m;e.style.display="";document.getElementById("auth-success").style.display="none";}
    function showOk(m){const e=document.getElementById("auth-success");e.textContent=m;e.style.display="";document.getElementById("auth-error").style.display="none";}
    function clearMsg(){document.getElementById("auth-error").style.display="none";document.getElementById("auth-success").style.display="none";}
    async function handleLogin(e){
      e.preventDefault();const btn=document.getElementById("login-btn");btn.disabled=true;btn.textContent="Logging in...";clearMsg();
      try{
        const r=await fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:document.getElementById("login-username").value,password:document.getElementById("login-password").value})});
        const d=await r.json();
        if(d.ok){showOk("Welcome back, "+d.username+"! Redirecting...");setTimeout(()=>window.location.href="/",800);}
        else showErr(d.error||"Login failed");
      }catch{showErr("Connection error.");}
      btn.disabled=false;btn.textContent="Login";
    }
    async function handleRegister(e){
      e.preventDefault();
      const pw=document.getElementById("reg-password").value,c=document.getElementById("reg-confirm").value;
      if(pw!==c){showErr("Passwords do not match");return;}
      const btn=document.getElementById("reg-btn");btn.disabled=true;btn.textContent="Creating account...";clearMsg();
      try{
        const r=await fetch("/api/auth/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:document.getElementById("reg-username").value,password:pw})});
        const d=await r.json();
        if(d.ok){showOk("Welcome, "+d.username+"! Redirecting...");setTimeout(()=>window.location.href="/",800);}
        else showErr(d.error||"Registration failed");
      }catch{showErr("Connection error.");}
      btn.disabled=false;btn.textContent="Create Account";
    }
  </script>
</body>
</html>
