<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>MBTI Quiz - VieroMind</title>
  <link rel="stylesheet" href="/css/styles.css"/>
  <style>
    .quiz-wrap{position:relative;z-index:2;max-width:720px;margin:0 auto;padding:80px 1.5rem 2rem;}
    .quiz-card{background:rgba(255,255,255,0.03);border:1px solid rgba(168,85,247,0.2);border-radius:1.25rem;padding:2.5rem;}
    .quiz-progress-bar{height:4px;background:rgba(255,255,255,0.08);border-radius:9999px;margin-bottom:2rem;overflow:hidden;}
    .quiz-progress-fill{height:100%;background:linear-gradient(90deg,#9333ea,#ec4899);border-radius:9999px;transition:width 0.4s ease;}
    .quiz-qnum{font-size:0.75rem;color:rgba(255,255,255,0.4);margin-bottom:0.75rem;text-transform:uppercase;letter-spacing:0.06em;}
    .quiz-question{font-size:1.15rem;font-weight:600;color:#e9d5ff;line-height:1.6;margin-bottom:1.75rem;}
    .quiz-options{display:flex;flex-direction:column;gap:0.75rem;}
    .quiz-option{padding:12px 18px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(168,85,247,0.15);color:#e2e8f0;font-size:0.9rem;cursor:pointer;transition:all 0.2s;text-align:left;}
    .quiz-option:hover{background:rgba(168,85,247,0.15);border-color:rgba(168,85,247,0.4);}
    .quiz-option.selected{background:rgba(147,51,234,0.25);border-color:rgba(147,51,234,0.7);color:#fff;}
    .quiz-nav{display:flex;gap:10px;margin-top:2rem;justify-content:flex-end;}
    .nav-btn{padding:9px 24px;border-radius:9999px;font-size:0.875rem;font-weight:600;cursor:pointer;border:1px solid;transition:all 0.2s;}
    .nav-btn-ghost{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.12);color:rgba(255,255,255,0.6);}
    .nav-btn-ghost:hover{background:rgba(255,255,255,0.08);color:#fff;}
    .nav-btn-primary{background:linear-gradient(135deg,#9333ea,#7c3aed);border-color:transparent;color:#fff;}
    .nav-btn-danger{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.25);color:#fca5a5;}
    .result-type{font-size:3.5rem;font-weight:900;background:linear-gradient(135deg,#c084fc,#f9a8d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .result-name{font-size:1.3rem;font-weight:700;color:#e9d5ff;margin:.5rem 0;}
    .result-desc{font-size:0.9rem;color:rgba(255,255,255,0.55);line-height:1.7;max-width:480px;margin:0 auto 1.5rem;}
    .result-traits{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:2rem;}
    .result-trait{padding:5px 14px;border-radius:9999px;background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.3);color:#d8b4fe;font-size:0.78rem;font-weight:600;}
    .start-wrap,.result-card{text-align:center;padding:1rem;}
    .start-title{font-size:1.5rem;font-weight:700;color:#e9d5ff;margin-bottom:0.75rem;}
    .start-sub{font-size:0.9rem;color:rgba(255,255,255,0.45);margin-bottom:2rem;}
    .start-btn{padding:12px 40px;border-radius:9999px;background:linear-gradient(135deg,#9333ea,#ec4899);color:#fff;font-weight:700;font-size:1rem;border:none;cursor:pointer;transition:transform 0.2s;}
    .start-btn:hover{transform:scale(1.04);}
    .lang-btn{padding:5px 14px;border-radius:9999px;background:transparent;border:1px solid rgba(168,85,247,0.25);color:rgba(255,255,255,0.5);font-size:0.78rem;cursor:pointer;}
    .lang-btn.active{background:rgba(147,51,234,0.3);border-color:rgba(168,85,247,0.5);color:#d8b4fe;}
    .lang-row{display:flex;gap:8px;margin-bottom:1.5rem;}
  </style>
</head>
<body>
  <div style="position:fixed;width:400px;height:400px;background:rgba(147,51,234,0.3);filter:blur(150px);top:-80px;left:-80px;pointer-events:none;z-index:0;border-radius:50%;"></div>
  <div style="position:fixed;width:350px;height:350px;background:rgba(236,72,153,0.3);filter:blur(130px);bottom:-60px;right:-60px;pointer-events:none;z-index:0;border-radius:50%;"></div>
  <nav class="navbar">
    <div class="navbar-inner">
      <img class="navbar-logo" src="/logo.webp" alt="VieroMind"/>
      <h2 class="navbar-title glow-text">VieroMind</h2>
    </div>
  </nav>
  <div class="quiz-wrap">
    <a href="/?features=1" class="page-back-btn">&#8592; Back to Features</a>
    <div class="lang-row">
      <button class="lang-btn active" id="lang-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="lang-ur" onclick="setLang('ur')">اردو</button>
    </div>
    <div class="quiz-card" id="quiz-container"></div>
  </div>
  <script src="/js/mbti.js"></script>
</body>
</html>
