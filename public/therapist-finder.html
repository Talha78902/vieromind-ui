<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Therapist Finder - VieroMind</title>
  <link rel="stylesheet" href="/css/styles.css"/>
  <style>
    .tf-wrap{position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:80px 1.5rem 2rem;}
    .tf-title{font-size:1.8rem;font-weight:800;color:#e9d5ff;margin-bottom:0.5rem;}
    .tf-sub{font-size:0.9rem;color:rgba(255,255,255,0.4);margin-bottom:2rem;}
    .filter-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:1.5rem;align-items:center;}
    .filter-select{padding:8px 14px;border-radius:9999px;background:rgba(255,255,255,0.04);border:1px solid rgba(168,85,247,0.2);color:#e2e8f0;font-size:0.85rem;cursor:pointer;outline:none;}
    .filter-select option{background:#1a0030;}
    .search-input{flex:1;min-width:180px;padding:8px 16px;border-radius:9999px;background:rgba(255,255,255,0.04);border:1px solid rgba(168,85,247,0.2);color:#e2e8f0;font-size:0.85rem;outline:none;}
    .search-input::placeholder{color:rgba(255,255,255,0.3);}
    .clear-btn{padding:8px 18px;border-radius:9999px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;font-size:0.8rem;cursor:pointer;}
    .view-row{display:flex;align-items:center;gap:8px;margin-bottom:1rem;}
    .view-btn{width:32px;height:32px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);cursor:pointer;font-size:0.8rem;}
    .view-btn.active{background:rgba(147,51,234,0.25);border-color:rgba(147,51,234,0.5);color:#d8b4fe;}
    .count-label{font-size:0.8rem;color:rgba(255,255,255,0.35);margin-left:auto;}
    .therapist-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;}
    .therapist-grid.cols-1{grid-template-columns:1fr;}
    .therapist-card{background:rgba(255,255,255,0.03);border:1px solid rgba(168,85,247,0.15);border-radius:1rem;padding:1.25rem;transition:all 0.2s;}
    .therapist-card:hover{border-color:rgba(168,85,247,0.4);box-shadow:0 0 20px rgba(168,85,247,0.1);}
    .tc-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:0.75rem;}
    .tc-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#9333ea,#ec4899);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;color:#fff;flex-shrink:0;}
    .tc-name{font-size:1rem;font-weight:700;color:#e9d5ff;}
    .tc-spec{font-size:0.78rem;color:rgba(255,255,255,0.45);}
    .tc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:0.75rem;}
    .tc-tag{padding:3px 10px;border-radius:9999px;background:rgba(147,51,234,0.15);border:1px solid rgba(147,51,234,0.2);color:#c084fc;font-size:0.7rem;}
    .tc-info{display:flex;flex-wrap:wrap;gap:10px;font-size:0.78rem;color:rgba(255,255,255,0.45);}
    .tc-footer{display:flex;gap:8px;margin-top:0.875rem;flex-wrap:wrap;}
    .tc-btn{padding:6px 16px;border-radius:9999px;font-size:0.78rem;font-weight:600;cursor:pointer;border:1px solid;}
    .tc-btn-primary{background:linear-gradient(135deg,#9333ea,#7c3aed);color:#fff;border-color:transparent;}
    .tc-btn-secondary{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);}
    .stars{color:#fbbf24;font-size:0.8rem;}
    .no-results{text-align:center;padding:4rem 1rem;color:rgba(255,255,255,0.3);}
  </style>
</head>
<body>
  <div style="position:fixed;top:-80px;right:-80px;width:400px;height:400px;background:rgba(147,51,234,0.3);filter:blur(150px);border-radius:50%;pointer-events:none;z-index:0;"></div>
  <div style="position:fixed;bottom:-60px;left:-60px;width:350px;height:350px;background:rgba(56,189,248,0.2);filter:blur(130px);border-radius:50%;pointer-events:none;z-index:0;"></div>
  <nav class="navbar">
    <div class="navbar-inner">
      <img class="navbar-logo" src="/logo.webp" alt="VieroMind"/>
      <h2 class="navbar-title glow-text">VieroMind</h2>
    </div>
  </nav>
  <div class="tf-wrap">
    <a href="/?features=1" class="page-back-btn">&#8592; Back to Features</a>
    <h1 class="tf-title glow-text">Therapist Finder</h1>
    <p class="tf-sub">Browse verified mental health professionals worldwide</p>
    <div class="filter-row">
      <input class="search-input" type="text" id="search-input" placeholder="Search name or specialty…" oninput="applyFilters()"/>
      <select class="filter-select" id="filter-spec" onchange="applyFilters()"><option value="">All Specialties</option></select>
      <select class="filter-select" id="filter-country" onchange="applyFilters()"><option value="">All Countries</option></select>
      <select class="filter-select" id="filter-lang" onchange="applyFilters()"><option value="">All Languages</option></select>
      <button class="clear-btn" onclick="clearFilters()">✕ Clear</button>
    </div>
    <div class="view-row">
      <button class="view-btn" onclick="setColumns(1)">▤</button>
      <button class="view-btn active" onclick="setColumns(2)">▦</button>
      <span class="count-label" id="count-label"></span>
    </div>
    <div class="therapist-grid" id="therapist-grid"></div>
  </div>
  <script src="/js/therapist-finder.js"></script>
</body>
</html>
